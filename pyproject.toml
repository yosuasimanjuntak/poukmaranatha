[tool.ruff]
line-length = 100
target-version = "py314"
extend-exclude = [
    ".venv",
    "staticfiles",
    "theme/static_src/node_modules",
    "**/migrations/*.py",
]

[tool.ruff.lint]
extend-select = ["I", "B", "UP", "DJ"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.dev"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
addopts = "--reuse-db"
