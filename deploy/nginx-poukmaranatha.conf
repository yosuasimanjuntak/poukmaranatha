# /etc/nginx/sites-available/poukmaranatha
#
# Initial install: copy this file as-is, symlink into sites-enabled, reload nginx.
# Then run `certbot --nginx -d poukmaranatha.ionyx.org` and it will rewrite the
# server block to add port 443 + redirect 80 -> 443.
#
# After certbot, the file lives at /etc/nginx/sites-available/poukmaranatha and is
# managed by certbot for auto-renewal. Re-running this template is fine — certbot
# detects the existing cert and re-applies its block.

# --- Cloudflare real-IP (so Django sees real client IPs, not CF edge IPs) ---
# Pinned to the Cloudflare IP ranges as of 2026-05.  Refresh from
# https://www.cloudflare.com/ips/ if you ever see edge IPs in your access log.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

server {
    listen 80;
    listen [::]:80;
    server_name poukmaranatha.ionyx.org;

    # Reasonable upload cap (profile photos etc).
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/poukmaranatha-access.log;
    error_log  /var/log/nginx/poukmaranatha-error.log warn;

    # Static files served by nginx with a long cache (manifest-hashed by Django).
    location /static/ {
        alias /srv/poukmaranatha/staticfiles/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Make sure WhiteNoise's pre-compressed .gz / .br variants are served when
        # the client supports them.
        gzip_static on;
    }

    # User-uploaded media.
    location /media/ {
        alias /srv/poukmaranatha/media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Reverse-proxy everything else to gunicorn.
    location / {
        proxy_pass         http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_redirect     off;

        # HTMX needs websockets-ish upgrade headers occasionally; harmless.
        proxy_set_header   Upgrade  $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
