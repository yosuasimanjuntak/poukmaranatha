{% load i18n %}
<section id="kolekte-section" class="space-y-3">
    <div class="section-head">
        <h3>{% trans "Edit Kolekte Entry" %}</h3>
    </div>
    <form hx-post="{% url 'ministry:kolekte_edit' entry.pk %}"
          hx-target="#kolekte-section"
          hx-swap="outerHTML"
          hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
          class="space-y-3 rounded-lg border border-primary-50 bg-surface p-4">
        <div class="flex flex-wrap gap-2">
            <div class="flex-1 min-w-36">
                <label class="block text-xs font-medium text-ink-muted mb-1">{% trans "Type" %}</label>
                {{ form.type.errors }}
                <select name="{{ form.type.html_name }}" class="select select-sm w-full">
                    {% for val, label in form.type.field.choices %}
                    <option value="{{ val }}" {% if val == entry.type %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex-1 min-w-36">
                <label class="block text-xs font-medium text-ink-muted mb-1">{% trans "Amount (IDR)" %}</label>
                {{ form.total.errors }}
                <input type="number" name="{{ form.total.html_name }}" class="input input-sm w-full"
                       value="{{ entry.total }}" min="0" step="1000">
            </div>
        </div>
        <div>
            <label class="block text-xs font-medium text-ink-muted mb-1">{% trans "Notes" %}</label>
            {{ form.notes.errors }}
            <input type="text" name="{{ form.notes.html_name }}" class="input input-sm w-full"
                   value="{{ entry.notes }}">
        </div>
        <div class="flex gap-2">
            <button type="submit" class="btn btn-primary btn-sm">
                {% include "components/spinner.html" %}
                <span>{% trans "Update" %}</span>
            </button>
            <button type="button" class="btn btn-ghost btn-sm"
                    hx-get="{% url 'ministry:kolekte_list' entry.schedule.pk %}"
                    hx-target="#kolekte-section"
                    hx-swap="outerHTML">
                {% trans "Cancel" %}
            </button>
        </div>
    </form>
</section>
