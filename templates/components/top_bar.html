{% load i18n %}
<header class="sticky top-0 z-30 bg-primary-dark text-white shadow">
    <div class="mx-auto flex h-12 max-w-5xl items-center justify-between px-4">
        <a href="{% url 'ministry:schedule_list' %}" class="press flex items-center gap-2 font-semibold tracking-tight">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2 4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6l-8-4z"/>
            </svg>
            <span>{% block top_title %}poukmaranatha{% endblock %}</span>
        </a>
        <div class="flex items-center gap-2">
            {% include "components/language_switcher.html" %}
            {% if user.is_authenticated %}
                <a href="{% url 'accounts:profile_edit' %}"
                   class="press flex items-center gap-2 rounded-full bg-white/10 px-2 py-1 text-xs transition-colors duration-150"
                   style="transition-timing-function: var(--ease-out-strong);">
                    {% if user.photo %}
                        <img src="{{ user.photo.url }}" alt="" class="h-6 w-6 rounded-full object-cover">
                    {% else %}
                        <span class="flex h-6 w-6 items-center justify-center rounded-full bg-accent text-[10px] font-bold uppercase">
                            {{ user.display_name|slice:":1" }}
                        </span>
                    {% endif %}
                </a>
            {% endif %}
        </div>
    </div>
</header>
